name: Build Desktop App

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify dist output
        shell: pwsh
        run: |
          echo "=== env vars ==="
          echo "VITE_SUPABASE_URL=$env:VITE_SUPABASE_URL"
          echo "VITE_SUPABASE_ANON_KEY set=$(if ($env:VITE_SUPABASE_ANON_KEY) { 'yes' } else { 'no' })"
          echo "=== dist/index.html ==="
          Get-Content dist\index.html
          echo "=== dist/assets ==="
          Get-ChildItem dist\assets | Select-Object Name,Length
          echo "=== tsconfig.app.json ==="
          Get-Content tsconfig.app.json 2>$null
          echo "=== vite.config.ts ==="
          Get-Content vite.config.ts 2>$null

      - run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify build output
        shell: pwsh
        run: |
          echo "=== builder-debug.yml ==="
          Get-Content release\builder-debug.yml 2>$null
          echo "=== win-unpacked contents ==="
          Get-ChildItem release\win-unpacked | Select-Object Name
          echo "=== app.asar exists ==="
          Test-Path release\win-unpacked\resources\app.asar
          echo "=== asar top-level ==="
          npx asar list release\win-unpacked\resources\app.asar 2>$null | Select-Object -First 30
          echo "=== Lektorat.exe size ==="
          (Get-Item release\win-unpacked\Lektorat.exe).Length

      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: release/*.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-unpacked
          path: release/win-unpacked/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/*.dmg
